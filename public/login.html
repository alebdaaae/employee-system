<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle at top, #b30000, #1a0000);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            background: white;
            padding: 40px;
            width: 360px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #b30000;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            background: #b30000;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #8b0000;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="box">

    <!-- LOGO -->
    <img src="logo.png" class="logo" alt="Company Logo">

    <h2>Employee Login</h2>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        © alebdaa.ae HR System
    </div>

</div>

<script>
document.getElementById("loginForm").onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email: email.value,
            password: password.value
        })
    });

    const data = await res.json().catch(() => null);

    if(!data){
        alert("Server Error");
        return;
    }

    if(data.error){
        alert(data.error);
        return;
    }

    //  التوجيه حسب الصلاحية
    if(data.role === "admin"){
        window.location = "/admin.html";
    } else {
        window.location = "/dashboard.html";
    }
};
</script>

</body>
</html>
